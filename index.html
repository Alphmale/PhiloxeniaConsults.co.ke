<!DOCTYPE html>
<html>
  <head>
    <title>My Website</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <iframe src="https://philoxeniaconsult.lovable.app/"></iframe>
  </body>
</html>
<section id="quote" class="philoxenia-quote-section">
  <div class="philoxenia-quote-card">
    <form
      action="https://formspree.io/f/mojprrze"
      method="POST"
      class="philoxenia-quote-form"
    >
      <div class="form-grid">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="Full Name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="Phone Number" placeholder="0712 345 678" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="Email Address" placeholder="you@company.co.ke" required>
        </div>

        <div class="form-group">
          <label for="business">Business Name</label>
          <input type="text" id="business" name="Business Name" placeholder="Your Company Ltd">
        </div>
      </div>

      <div class="form-group">
        <label for="service">Service Needed</label>
        <select id="service" name="Service Needed" required>
          <option value="">Select a service</option>
          <option>Business Consultancy</option>
          <option>Company Registration</option>
          <option>Branding & Strategy</option>
          <option>Compliance Support</option>
          <option>General Application</option>
        </select>
      </div>

      <div class="form-group">
        <label for="details">Details / Request</label>
        <textarea
          id="details"
          name="Details / Request"
          rows="6"
          placeholder="Tell us what you need and we’ll help you bring it to life..."
          required
        ></textarea>
      </div>

      <input type="hidden" name="_subject" value="New Philoxenia Quote / Application">
      <input type="hidden" name="_next" value="https://philoxeniaconsult.dpdns.org/thank-you.html">

      <button type="submit" class="quote-btn">Request Free Quote</button>
    </form>
  </div>
</section>

<style>
  .philoxenia-quote-section {
    padding: 70px 20px;
    background:
      radial-gradient(circle at top left, rgba(255, 145, 77, 0.25), transparent 30%),
      radial-gradient(circle at bottom right, rgba(255, 94, 98, 0.18), transparent 35%),
      linear-gradient(135deg, #fff7f0, #fff1eb, #fffaf5);
  }

  .philoxenia-quote-card {
    max-width: 900px;
    margin: 0 auto;
    padding: 34px;
    border-radius: 26px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,248,243,0.96));
    border: 1px solid rgba(255, 170, 90, 0.22);
    box-shadow: 0 20px 50px rgba(255, 135, 70, 0.18);
  }

  .philoxenia-quote-form .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 700;
    color: #2d2a4a;
    letter-spacing: 0.2px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 15px 16px;
    border-radius: 16px;
    border: 2px solid #ffd9bf;
    background: linear-gradient(180deg, #fffdfa, #fff6ef);
    font-size: 1rem;
    color: #2b2b2b;
    outline: none;
    transition: all 0.25s ease;
  }

  .form-group input::placeholder,
  .form-group textarea::placeholder {
    color: #b08b7a;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: #ff8c42;
    background: #fffdfb;
    box-shadow: 0 0 0 4px rgba(255, 140, 66, 0.16);
    transform: translateY(-1px);
  }

  .quote-btn {
    width: 100%;
    border: none;
    padding: 16px 20px;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    background: linear-gradient(135deg, #ff8c42 0%, #ff6b57 45%, #f4a641 100%);
    box-shadow: 0 12px 28px rgba(255, 120, 70, 0.28);
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  }

  .quote-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 34px rgba(255, 120, 70, 0.34);
    opacity: 0.98;
  }

  .quote-btn:active {
    transform: translateY(0);
  }

  @media (max-width: 768px) {
    .philoxenia-quote-card {
      padding: 22px;
    }

    .philoxenia-quote-form .form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philoxenia Consults</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at top left, rgba(255, 145, 77, 0.30), transparent 28%),
        radial-gradient(circle at center right, rgba(255, 94, 98, 0.22), transparent 26%),
        radial-gradient(circle at bottom left, rgba(244, 166, 65, 0.20), transparent 25%),
        linear-gradient(135deg, #fff7ef, #fff1eb, #fff8f3);
    }

    .thank-you-card {
      max-width: 700px;
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,0.96);
      border-radius: 30px;
      padding: 48px 30px;
      border: 1px solid rgba(255, 170, 90, 0.22);
      box-shadow: 0 22px 55px rgba(255, 135, 70, 0.18);
    }

    .spark {
      font-size: 3rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
      color: #2d2a4a;
    }

    p {
      margin: 0 0 24px;
      font-size: 1.06rem;
      line-height: 1.8;
      color: #695f66;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      padding: 14px 24px;
      border-radius: 16px;
      background: linear-gradient(135deg, #ff8c42 0%, #ff6b57 45%, #f4a641 100%);
      box-shadow: 0 12px 28px rgba(255, 120, 70, 0.28);
    }

    .btn:hover {
      opacity: 0.97;
    }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <div class="spark">✨</div>
    <h1>Thank you</h1>
    <p>
      Your request has been received successfully. We’re excited to help you move forward and
      will get back to you within 24 hours.
    </p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
